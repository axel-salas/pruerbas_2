name: Publish Quarto Dashboard

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.6.0
          
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          uv pip install jupyter nbformat pandas matplotlib plotly

      - name: Render Quarto Project
        # Forzamos el renderizado a la carpeta /docs en la raíz
        run: |
          uv run quarto render dashboard --output-dir ../docs

      - name: Prevent Jekyll
        run: touch docs/.nojekyll

      - name: Commit and Push to docs folder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Actualización automática de dashboards en /docs [skip ci]" || echo "No hay cambios para subir"
          git push
